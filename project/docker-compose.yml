services:
  mlflow:
    image: python:3.10-slim
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - ./artifacts:/app/artifacts
    working_dir: /app
    command: >
      bash -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///app/artifacts/mlruns"

  emotion-api-cpu:
    build: 
      context: .
      dockerfile: Dockerfile.cpu
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    profiles:
      - cpu

  emotion-api-gpu:
    build: 
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    profiles:
      - gpu